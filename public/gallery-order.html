<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Order Manager — Alba Tull</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh}

  /* ── Password Gate ─────────────────────────────── */
  #gate{display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0a}
  #gate-inner{text-align:center}
  #gate h1{font-size:1.6rem;margin-bottom:1rem;letter-spacing:2px;color:#ccc}
  #gate .pw-input{padding:12px 20px;font-size:1rem;border:1px solid #333;border-radius:8px;background:#111;color:#fff;width:260px;text-align:center;display:block;margin:0 auto;-webkit-text-security:disc}
  #gate .pw-input:focus{outline:none;border-color:#4a90d9}
  #gate .pw-btn{margin-top:12px;padding:10px 30px;font-size:.95rem;border:none;border-radius:8px;background:#4a90d9;color:#fff;cursor:pointer;font-weight:600}
  #gate .pw-btn:hover{background:#5aa0e9}
  #gate .error{color:#e74c3c;margin-top:8px;font-size:.85rem}

  /* ── Main App ──────────────────────────────────── */
  #app{display:none;max-width:1400px;margin:0 auto;padding:20px}
  .toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px;padding:16px;background:#111;border-radius:10px;border:1px solid #222}
  .toolbar select{padding:10px 14px;font-size:.95rem;border:1px solid #333;border-radius:8px;background:#1a1a1a;color:#fff;min-width:220px}
  .toolbar select:focus{outline:none;border-color:#4a90d9}
  .toolbar button{padding:10px 20px;font-size:.95rem;border:none;border-radius:8px;cursor:pointer;font-weight:600;transition:all .2s}
  .btn-apply{background:#27ae60;color:#fff}
  .btn-apply:hover{background:#2ecc71}
  .btn-apply:disabled{background:#333;color:#666;cursor:not-allowed}
  .btn-clear{background:#c0392b;color:#fff}
  .btn-clear:hover{background:#e74c3c}
  .btn-reset{background:#333;color:#ccc}
  .btn-reset:hover{background:#444}

  .status{padding:10px 16px;border-radius:8px;margin-bottom:16px;font-size:.9rem;display:none}
  .status.info{display:block;background:#1a3a5c;border:1px solid #2980b9;color:#7fb3e0}
  .status.success{display:block;background:#1a3c1a;border:1px solid #27ae60;color:#7fe07f}
  .status.error{display:block;background:#3c1a1a;border:1px solid #c0392b;color:#e07f7f}

  /* ── Sections ──────────────────────────────────── */
  .section-label{font-size:1.1rem;font-weight:700;margin:16px 0 10px;padding:8px 0;border-bottom:1px solid #222}
  .section-label.pinned{color:#f39c12}
  .section-label.available{color:#7f8c8d}

  /* ── Pinned Slots ──────────────────────────────── */
  .pinned-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:24px;min-height:120px;padding:16px;background:#111;border-radius:10px;border:2px dashed #333}
  .pinned-slot{position:relative;aspect-ratio:1;background:#1a1a1a;border-radius:8px;border:2px solid #333;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:all .2s}
  .pinned-slot.empty{border-style:dashed;opacity:.4}
  .pinned-slot.filled{border-color:#f39c12}
  .pinned-slot.filled:hover{border-color:#e74c3c}
  .pinned-slot.filled:hover::after{content:'Remove';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(231,76,60,.8);color:#fff;font-weight:700;font-size:.85rem;z-index:5}
  .pinned-slot img{width:100%;height:100%;object-fit:cover}
  .slot-num{position:absolute;top:4px;left:4px;background:rgba(243,156,18,.9);color:#000;font-weight:800;font-size:.75rem;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;z-index:3}
  .pinned-slot .slot-title{position:absolute;bottom:0;left:0;right:0;padding:4px 6px;background:linear-gradient(transparent,rgba(0,0,0,.8));font-size:.7rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ── Photo Grid ────────────────────────────────── */
  .photo-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
  .photo-card{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .2s}
  .photo-card:hover{border-color:#4a90d9;transform:scale(1.03)}
  .photo-card.is-pinned{opacity:.35;pointer-events:none;border-color:#f39c12}
  .photo-card.is-pinned::after{content:'#' attr(data-pin-num);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.8rem;font-weight:900;color:#f39c12}
  .photo-card img{width:100%;height:100%;object-fit:cover}
  .photo-card .card-title{position:absolute;bottom:0;left:0;right:0;padding:4px 6px;background:linear-gradient(transparent,rgba(0,0,0,.85));font-size:.65rem;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .loading{text-align:center;padding:60px;color:#555;font-size:1.1rem}
  .loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid #333;border-top-color:#4a90d9;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:12px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .count-badge{background:#222;padding:4px 10px;border-radius:12px;font-size:.85rem;color:#888}
  .count-badge strong{color:#f39c12}

  @media(max-width:900px){
    .pinned-grid{grid-template-columns:repeat(4,1fr)}
    .photo-grid{grid-template-columns:repeat(5,1fr)}
  }
  @media(max-width:600px){
    .pinned-grid{grid-template-columns:repeat(3,1fr)}
    .photo-grid{grid-template-columns:repeat(3,1fr)}
  }
</style>
</head>
<body>

<!-- Password Gate — input injected by JS to defeat password managers -->
<div id="gate">
  <div id="gate-inner">
    <h1>GALLERY ORDER</h1>
    <div id="pw-container"></div>
    <div class="error" id="pw-error"></div>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <div class="toolbar">
    <select id="category-select">
      <option value="">-- Select a gallery --</option>
    </select>
    <span class="count-badge" id="pin-count"><strong>0</strong>/12 pinned</span>
    <button class="btn-apply" id="btn-apply" disabled>Apply Order</button>
    <button class="btn-clear" id="btn-clear">Clear All</button>
    <button class="btn-reset" id="btn-reset">Reload</button>
  </div>

  <div class="status" id="status"></div>

  <div class="section-label pinned">Pinned -- First 12 Slots (click a slot to remove, click a photo below to add)</div>
  <div class="pinned-grid" id="pinned-grid"></div>

  <div class="section-label available" id="available-label">Available Photos</div>
  <div class="photo-grid" id="photo-grid"></div>

  <div class="loading" id="loading" style="display:none">
    <div class="spinner"></div><br>Loading photos...
  </div>
</div>

<script>
/* ================================================================
   Gallery Order Manager — Alba Tull V6A
   Clean rewrite — March 2026
   ================================================================ */

// ── Config ──────────────────────────────────────────
var CONFIG = {
  projectId:  'vo1f0ucj',
  dataset:    'production',
  apiVersion: '2024-01-01',
  writeToken: 'skePaHb34ZaTMbrd8NbUMdd7XOrcee2MheG2OUrJ9VuvTsgkjNcluRz5agzruwbbYEtXXfvMgvSR34Xgz64XPMchQlhQoLMS1v9JSSGJUrmvQ380VTswdHje6yGcGtVxfWi43ralbrvAkloon9jn153nunAsAV8ZxjWMoK7asHvA8FBFpo1Z',
  readToken:  'sk2U3t7Ey5IgT5S8FZGwfkqY6TBManFJPFPWV1Zz800IgXQJZOzITVNwZ7egyDqrJcMOg2rcjaVdxezx9FcwlOYidKsAnkqw3XtI3hu6MiAyInI6RGkuipfP8kRV4eJs2gNZsDreaDHAi1soShcqpWAMoS1g5pRLHuDnjKs6KCZdSdlM7e5i',
  maxPins:    12,
  pwHash:     '93a2333edbe99e65960b31b0022616aeff99407fbbc03cf98ba50ffc6598bf5d'
};

var SANITY_BASE = 'https://' + CONFIG.projectId + '.api.sanity.io/v' + CONFIG.apiVersion + '/data';

// ── State ───────────────────────────────────────────
var allPhotos = [];
var pinnedIds = [];
var categories = [];

// ── DOM helper ──────────────────────────────────────
function $(id) { return document.getElementById(id); }

// ── Password Gate ───────────────────────────────────
// Build input dynamically after 300ms so password managers miss it
window.addEventListener('DOMContentLoaded', function() {
  setTimeout(buildPasswordGate, 300);
});

function buildPasswordGate() {
  var container = $('pw-container');

  var inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'pw-input';
  inp.placeholder = 'Enter password';
  inp.autocomplete = 'off';
  inp.name = 'gk_' + Date.now();
  inp.setAttribute('data-1p-ignore', 'true');
  inp.setAttribute('data-lpignore', 'true');

  var btn = document.createElement('button');
  btn.className = 'pw-btn';
  btn.textContent = 'Enter';
  btn.type = 'button';

  container.appendChild(inp);
  container.appendChild(btn);
  inp.focus();

  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); tryPassword(inp); }
  });
  btn.addEventListener('click', function() { tryPassword(inp); });
}

function tryPassword(inp) {
  var pw = inp.value.trim();
  if (!pw) { $('pw-error').textContent = 'Please enter a password'; return; }

  crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw)).then(function(buf) {
    var hash = Array.from(new Uint8Array(buf)).map(function(b) {
      return b.toString(16).padStart(2, '0');
    }).join('');

    if (hash === CONFIG.pwHash) {
      $('gate').style.display = 'none';
      $('app').style.display = 'block';
      initApp();
    } else {
      $('pw-error').textContent = 'Wrong password';
      inp.value = '';
      inp.focus();
    }
  });
}

// ── App Init ────────────────────────────────────────
function initApp() {
  $('category-select').addEventListener('change', loadCategory);
  $('btn-apply').addEventListener('click', applyOrder);
  $('btn-clear').addEventListener('click', clearPins);
  $('btn-reset').addEventListener('click', loadCategory);

  loadCategories();
}

// ── Sanity Helpers ──────────────────────────────────
function sanityImageUrl(ref, w) {
  w = w || 200;
  if (!ref || !ref.asset) return '';
  var id = ref.asset._ref || ref.asset._id || '';
  var m = id.match(/^image-(.+)-(\d+x\d+)-(\w+)$/);
  if (!m) return '';
  return 'https://cdn.sanity.io/images/' + CONFIG.projectId + '/' + CONFIG.dataset + '/' + m[1] + '-' + m[2] + '.' + m[3] + '?w=' + w + '&h=' + w + '&fit=crop&q=55';
}

function groq(query) {
  var url = SANITY_BASE + '/query/' + CONFIG.dataset + '?query=' + encodeURIComponent(query);
  console.log('[groq] Fetching:', url.substring(0, 120) + '...');

  return fetch(url, {
    headers: { 'Authorization': 'Bearer ' + CONFIG.readToken }
  }).then(function(resp) {
    console.log('[groq] Status:', resp.status);
    if (!resp.ok) {
      return resp.text().then(function(t) { throw new Error('Sanity API ' + resp.status + ': ' + t); });
    }
    return resp.json();
  }).then(function(data) {
    console.log('[groq] Results:', data.result ? data.result.length : 'N/A');
    return data.result;
  }).catch(function(err) {
    console.error('[groq] Error:', err);
    showStatus('API Error: ' + err.message, 'error');
    throw err;
  });
}

function mutate(mutations) {
  return fetch(SANITY_BASE + '/mutate/' + CONFIG.dataset, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + CONFIG.writeToken
    },
    body: JSON.stringify({ mutations: mutations })
  }).then(function(r) { return r.json(); });
}

// ── Load Categories ─────────────────────────────────
function loadCategories() {
  showStatus('Loading categories...', 'info');

  groq(
    '*[_type == "category"] | order(order asc, name asc) {' +
    '  _id, name, "slug": slug.current,' +
    '  "isParent": coalesce(isParent, false),' +
    '  "parentCategory": parentCategory->{name, "slug": slug.current},' +
    '  "children": *[_type == "category" && parentCategory._ref == ^._id] | order(order asc, name asc) {' +
    '    _id, name, "slug": slug.current' +
    '  },' +
    '  "photoCount": count(*[_type == "photo" && (category._ref == ^._id || ^._id in additionalCategories[]._ref)])' +
    '}'
  ).then(function(result) {
    categories = result;
    console.log('[loadCategories] Got', categories.length, 'categories');

    var sel = $('category-select');
    sel.innerHTML = '<option value="">-- Select a gallery --</option>';

    var parents = categories.filter(function(c) { return c.isParent; });
    var standalones = categories.filter(function(c) { return !c.isParent && !c.parentCategory; });
    var children = categories.filter(function(c) { return c.parentCategory; });

    // Parents with their children as optgroups
    parents.forEach(function(p) {
      var group = document.createElement('optgroup');
      group.label = p.name + ' (' + p.photoCount + ')';

      var opt = document.createElement('option');
      opt.value = 'parent:' + p.slug;
      opt.textContent = p.name + ' -- All (' + p.photoCount + ')';
      group.appendChild(opt);

      var kids = children.filter(function(c) { return c.parentCategory.slug === p.slug; });
      kids.forEach(function(k) {
        var ko = document.createElement('option');
        ko.value = k.slug;
        ko.textContent = '  ' + k.name + ' (' + (k.photoCount || 0) + ')';
        group.appendChild(ko);
      });

      sel.appendChild(group);
    });

    // Standalone categories
    if (standalones.length > 0) {
      var group = document.createElement('optgroup');
      group.label = 'Other';
      standalones.forEach(function(s) {
        var opt = document.createElement('option');
        opt.value = s.slug;
        opt.textContent = s.name + ' (' + s.photoCount + ')';
        group.appendChild(opt);
      });
      sel.appendChild(group);
    }

    hideStatus();
  }).catch(function(err) {
    showStatus('Failed to load categories: ' + err.message, 'error');
    console.error('[loadCategories] Error:', err);
  });
}

// ── Load Photos for Category ────────────────────────
function loadCategory() {
  var val = $('category-select').value;
  if (!val) return;

  $('loading').style.display = 'block';
  $('photo-grid').innerHTML = '';
  $('pinned-grid').innerHTML = '';
  pinnedIds = [];
  updatePinCount();

  var query;
  if (val.indexOf('parent:') === 0) {
    var parentSlug = val.replace('parent:', '');
    query =
      '*[_type == "photo" && (' +
      '  category->parentCategory->slug.current == "' + parentSlug + '" ||' +
      '  category->slug.current == "' + parentSlug + '" ||' +
      '  "' + parentSlug + '" in additionalCategories[]->parentCategory->slug.current' +
      ')] | order(coalesce(displayOrder, 9999) asc, title asc) {' +
      '  _id, title, "slug": slug.current, image, displayOrder,' +
      '  category->{name, "slug": slug.current}' +
      '}';
  } else {
    query =
      '*[_type == "photo" && (' +
      '  category->slug.current == "' + val + '" ||' +
      '  "' + val + '" in additionalCategories[]->slug.current' +
      ')] | order(coalesce(displayOrder, 9999) asc, title asc) {' +
      '  _id, title, "slug": slug.current, image, displayOrder,' +
      '  category->{name, "slug": slug.current}' +
      '}';
  }

  groq(query).then(function(result) {
    allPhotos = result;
    $('loading').style.display = 'none';

    // Pre-populate pinned list from existing displayOrder (1-12 only)
    var ordered = allPhotos
      .filter(function(p) { return p.displayOrder && p.displayOrder >= 1 && p.displayOrder <= 12; })
      .sort(function(a, b) { return a.displayOrder - b.displayOrder; });
    pinnedIds = ordered.map(function(p) { return p._id; });

    $('available-label').textContent = 'Available Photos (' + allPhotos.length + ' total)';
    render();
  }).catch(function(err) {
    $('loading').style.display = 'none';
    showStatus('Failed to load photos: ' + err.message, 'error');
  });
}

// ── Render ──────────────────────────────────────────
function render() {
  renderPinnedGrid();
  renderPhotoGrid();
  updatePinCount();
}

function renderPinnedGrid() {
  var grid = $('pinned-grid');
  grid.innerHTML = '';

  for (var i = 0; i < CONFIG.maxPins; i++) {
    var slot = document.createElement('div');
    slot.className = 'pinned-slot';

    if (i < pinnedIds.length) {
      var photo = allPhotos.find(function(p) { return p._id === pinnedIds[i]; });
      if (photo) {
        slot.className += ' filled';
        slot.innerHTML =
          '<span class="slot-num">' + (i+1) + '</span>' +
          '<img src="' + sanityImageUrl(photo.image) + '" alt="' + photo.title + '">' +
          '<div class="slot-title">' + photo.title + '</div>';
        (function(idx) {
          slot.onclick = function() { removePin(idx); };
        })(i);
      }
    } else {
      slot.className += ' empty';
      slot.innerHTML = '<span class="slot-num" style="background:none;color:#333;font-size:1.5rem">' + (i+1) + '</span>';
    }

    grid.appendChild(slot);
  }
}

function renderPhotoGrid() {
  var grid = $('photo-grid');
  grid.innerHTML = '';

  allPhotos.forEach(function(photo) {
    var card = document.createElement('div');
    card.className = 'photo-card';

    var pinIndex = pinnedIds.indexOf(photo._id);
    if (pinIndex >= 0) {
      card.className += ' is-pinned';
      card.setAttribute('data-pin-num', pinIndex + 1);
    }

    card.innerHTML =
      '<img src="' + sanityImageUrl(photo.image) + '" alt="' + photo.title + '" loading="lazy">' +
      '<div class="card-title">' + photo.title + '</div>';

    if (pinIndex < 0) {
      (function(id) {
        card.onclick = function() { addPin(id); };
      })(photo._id);
    }

    grid.appendChild(card);
  });
}

// ── Pin/Unpin ───────────────────────────────────────
function addPin(photoId) {
  if (pinnedIds.length >= CONFIG.maxPins) {
    showStatus('Already at ' + CONFIG.maxPins + ' pins -- remove one first', 'error');
    setTimeout(hideStatus, 2000);
    return;
  }
  if (pinnedIds.indexOf(photoId) === -1) {
    pinnedIds.push(photoId);
    render();
    $('btn-apply').disabled = false;
  }
}

function removePin(index) {
  pinnedIds.splice(index, 1);
  render();
  $('btn-apply').disabled = false;
}

function clearPins() {
  pinnedIds = [];
  render();
  $('btn-apply').disabled = false;
}

function updatePinCount() {
  $('pin-count').innerHTML = '<strong>' + pinnedIds.length + '</strong>/' + CONFIG.maxPins + ' pinned';
}

// ── Apply Order to Sanity ───────────────────────────
function applyOrder() {
  var btn = $('btn-apply');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  showStatus('Saving display order to Sanity...', 'info');

  var mutations = [];

  // Clear displayOrder from photos that were pinned but aren't anymore
  allPhotos.forEach(function(p) {
    if (p.displayOrder && p.displayOrder >= 1 && p.displayOrder <= 12 && pinnedIds.indexOf(p._id) === -1) {
      mutations.push({
        patch: { id: p._id, unset: ['displayOrder'] }
      });
    }
  });

  // Set displayOrder on pinned photos (1-indexed)
  pinnedIds.forEach(function(id, i) {
    mutations.push({
      patch: { id: id, set: { displayOrder: i + 1 } }
    });
  });

  if (mutations.length === 0) {
    showStatus('No changes to save', 'info');
    btn.textContent = 'Apply Order';
    return;
  }

  // Batch in groups of 50
  var batches = [];
  for (var i = 0; i < mutations.length; i += 50) {
    batches.push(mutations.slice(i, i + 50));
  }

  var chain = Promise.resolve();
  batches.forEach(function(batch) {
    chain = chain.then(function() {
      return mutate(batch).then(function(result) {
        if (result.error) throw new Error(result.error.description || 'Mutation failed');
      });
    });
  });

  chain.then(function() {
    showStatus('Saved! ' + pinnedIds.length + ' photos pinned to top. Next build will auto-order the rest.', 'success');
    btn.textContent = 'Apply Order';
    return loadCategory();
  }).catch(function(err) {
    showStatus('Error: ' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Apply Order';
  });
}

// ── Status Helpers ──────────────────────────────────
function showStatus(msg, type) {
  var el = $('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}

function hideStatus() {
  $('status').className = 'status';
}
</script>
</body>
</html>
