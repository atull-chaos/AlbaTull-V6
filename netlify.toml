[build]
  command = "node seed-cache.mjs && rm -rf .astro && astro build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Redirects for clean URLs
[[redirects]]
  from = "/collections"
  to = "/collections/"
  status = 301

[[redirects]]
  from = "/category/*"
  to = "/category/:splat"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
